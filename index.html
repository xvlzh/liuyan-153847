<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>153847.xyz 留言板</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 50px auto; padding: 0 20px; line-height: 1.6; }
        h1 { color: #333; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #0070f3; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        button:hover { background: #0051a2; }
        #update-announcement-btn { background: #28a745; }
        #post-message-btn { background: #0070f3; }
        .announcement-box { background: #f0f7ff; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        #announcement-display { background: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; white-space: pre-wrap; }
        #update-status { margin-left: 10px; font-size: 0.9em; }
        .message-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .message-content { font-size: 1.1em; }
        .message-time { color: #666; font-size: 0.8em; }
    </style>
</head>
<script>
window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<body>
    <h1>📝 153847.xyz 留言板</h1>

    <!-- 公共公告栏（所有人可修改） -->
    <div class="announcement-box">
        <h3>📢 公共公告（所有人可编辑）</h3>
        <div id="announcement-display">加载中...</div>
        <div>
            <textarea id="announcement-input" rows="3" placeholder="输入新公告内容..."></textarea>
            <button id="update-announcement-btn">更新公告</button>
            <span id="update-status"></span>
        </div>
    </div>

    <!-- 匿名留言板 -->
    <h2>💬 匿名留言区</h2>
    <div style="margin-bottom: 20px;">
        <textarea id="new-message" rows="3" placeholder="写点什么... (无需填名字)"></textarea>
        <button id="post-message-btn">发布留言</button>
    </div>
    <div id="messages-list">
        加载留言中...
    </div>
        <script>
        // ===== 你的 Airtable 配置（请替换） =====
        const AIRTABLE_TOKEN = 'pattBEDyzs6ms7ABI.0648e1561f284e6fc8dd422b7fa925a274a87f7ae3c5cd91364f594bd226abe6';     // 你的 Personal Access Token（以 pat 开头）
        const AIRTABLE_BASE_ID = 'appSWD2bnJ4KS1MLL';   // 你的 Base ID（以 app 开头）

        // 公告栏用的表
        const ANNOUNCEMENT_TABLE = 'Table 1';      // 公告栏表名
        const ANNOUNCEMENT_RECORD_ID = 'recEHZwz7JnDHzvZx'; // 公告记录 ID

        // 留言板用的新表
        const MESSAGES_TABLE = 'Messages';              // 新留言表名

        // ---------- 公告栏功能 ----------
        async function loadAnnouncement() {
            try {
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${ANNOUNCEMENT_TABLE}/${ANNOUNCEMENT_RECORD_ID}`, {
                    headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
                });
                const data = await response.json();
                const content = data.fields.Content || '暂无公告';
                document.getElementById('announcement-display').innerText = content;
                document.getElementById('announcement-input').value = content;
            } catch (error) {
                console.error('加载公告失败:', error);
                document.getElementById('announcement-display').innerText = '加载失败，请刷新';
            }
        }

        async function updateAnnouncement() {
            const newContent = document.getElementById('announcement-input').value.trim();
            if (!newContent) { alert('请输入内容'); return; }

            const statusSpan = document.getElementById('update-status');
            statusSpan.innerText = '更新中...';

            try {
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${ANNOUNCEMENT_TABLE}/${ANNOUNCEMENT_RECORD_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fields: { Content: newContent } })
                });

                if (response.ok) {
                    statusSpan.innerText = '✅ 更新成功！';
                    document.getElementById('announcement-display').innerText = newContent;
                    setTimeout(() => { statusSpan.innerText = ''; }, 3000);
                } else {
                    statusSpan.innerText = '❌ 更新失败';
                }
            } catch (error) {
                console.error('更新失败:', error);
                statusSpan.innerText = '❌ 更新失败';
            }
        }

        // ---------- 留言板功能 ----------
        async function loadMessages() {
            try {
                // 只显示最新50条，按时间倒序（新到旧）
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${MESSAGES_TABLE}?sort[0][field]=CreatedAt&sort[0][direction]=desc&maxRecords=50`, {
                    headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
                });
                const data = await response.json();
                const messages = data.records;
                const listDiv = document.getElementById('messages-list');
                if (messages.length === 0) {
                    listDiv.innerHTML = '暂无留言，来发第一条吧！';
                    return;
                }
                let html = '';
                messages.forEach(record => {
                    const msg = record.fields.Message || '';
                    // 格式化时间，精确到秒
                    const time = record.fields.CreatedAt ? new Date(record.fields.CreatedAt).toLocaleString('zh-CN', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    }) : '';
                    html += `
                        <div class="message-item">
                            <div class="message-content">${escapeHtml(msg)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                });
                listDiv.innerHTML = html;
            } catch (error) {
                console.error('加载留言失败:', error);
                document.getElementById('messages-list').innerHTML = '加载失败，请刷新';
            }
        }

        async function postMessage() {
            const content = document.getElementById('new-message').value.trim();
            if (!content) { alert('请输入留言内容'); return; }

            try {
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${MESSAGES_TABLE}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${AIRTABLE_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fields: {
                            Message: content,
                            CreatedAt: new Date().toISOString()
                        }
                    })
                });

                if (response.ok) {
                    document.getElementById('new-message').value = '';
                    loadMessages(); // 重新加载留言列表
                } else {
                    alert('发布失败');
                }
            } catch (error) {
                console.error('发布失败:', error);
                alert('发布失败');
            }
        }

        // 简单的防XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 绑定事件
        document.getElementById('update-announcement-btn').addEventListener('click', updateAnnouncement);
        document.getElementById('post-message-btn').addEventListener('click', postMessage);

        // 初始加载
        loadAnnouncement();
        loadMessages();
    </script>
</body>
</html>
