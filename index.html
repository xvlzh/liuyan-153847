<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>高分辨率线性加速度 · 增强UI</title>
    <!-- Chart.js 用于绘制曲线 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1a, #101520);
            font-family: 'Segoe UI', system-ui, 'Roboto', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: rgba(20, 30, 45, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 20px 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #c0e0ff;
            letter-spacing: 1px;
            border-left: 3px solid #ffaa66;
            padding-left: 12px;
        }
        .grid-2col {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .grid-2col > div {
            flex: 1;
            min-width: 150px;
        }
        .data-label {
            color: #a0b8d0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .data-value {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            line-height: 1.2;
        }
        .unit {
            font-size: 0.8rem;
            color: #aaa;
        }
        .separator {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 16px 0;
        }
        .raw-data {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
        }
        .raw-data span {
            font-family: monospace;
            color: #aaccff;
        }
        button {
            background: #2c3e50;
            border: none;
            color: white;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        button:active {
            transform: scale(0.96);
        }
        .status-text {
            font-size: 0.8rem;
            color: #88ffaa;
            text-align: center;
            margin-top: 10px;
        }
        .chart-container {
            margin-top: 16px;
            background: #0a0f1a;
            border-radius: 20px;
            padding: 10px;
        }
        canvas {
            width: 100%;
            height: 180px;
            display: block;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #6a7a8a;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 线性加速度卡片 -->
    <div class="card">
        <div class="card-title">线性加速度 (高通滤波)</div>
        <div class="grid-2col">
            <div>
                <div class="data-label">X 轴</div>
                <div><span class="data-value" id="linX">--</span><span class="unit"> Gal</span></div>
            </div>
            <div>
                <div class="data-label">Y 轴</div>
                <div><span class="data-value" id="linY">--</span><span class="unit"> Gal</span></div>
            </div>
            <div>
                <div class="data-label">Z 轴</div>
                <div><span class="data-value" id="linZ">--</span><span class="unit"> Gal</span></div>
            </div>
        </div>
        <div class="separator"></div>
        <div class="raw-data">
            <div style="margin-bottom: 8px;">📊 原始含重力数据 (对比分辨率)</div>
            <div>X: <span id="rawX">--</span> Gal &nbsp; | Y: <span id="rawY">--</span> Gal &nbsp; | Z: <span id="rawZ">--</span> Gal</div>
        </div>
    </div>

    <!-- 图表卡片（展示合成线性加速度） -->
    <div class="card">
        <div class="card-title">合成加速度曲线 (线性)</div>
        <div class="chart-container">
            <canvas id="accelChart" width="400" height="180"></canvas>
        </div>
    </div>

    <!-- 控制卡片 -->
    <div class="card" style="text-align: center;">
        <button id="requestBtn">🔐 授权传感器（iOS必需，Android点不点都行）</button>
        <div id="status" class="status-text">⚡ 等待授权/数据...</div>
        <footer>原始算法未改动 | 曲线基于线性加速度合成值 | 静止时应接近 0 Gal</footer>
    </div>
</div>
<script>
        (function() {
            // 滤波参数 —— 截止频率约 5Hz（采样率按 50Hz 估算）
            const alpha = 0.2;   // 低通滤波系数，越小越平滑但响应慢
            // 重力估计初始值（假设设备初始静止，从第一帧学习）
            let gravityEst = { x: 0, y: 0, z: 0 };
            let firstFrame = true;
            
            // DOM 元素
            const linXSpan = document.getElementById('linX');
            const linYSpan = document.getElementById('linY');
            const linZSpan = document.getElementById('linZ');
            const rawXSpan = document.getElementById('rawX');
            const rawYSpan = document.getElementById('rawY');
            const rawZSpan = document.getElementById('rawZ');
            const statusSpan = document.getElementById('status');
            
            let motionHandler = null;
            
            // 处理 devicemotion 事件
            function onDeviceMotion(event) {
                const accWithG = event.accelerationIncludingGravity;
                if (!accWithG) {
                    statusSpan.innerText = '❌ 当前设备不支持 accelerationIncludingGravity';
                    return;
                }
                
                // 原始含重力数据（m/s²）
                let rawX = (accWithG.x !== undefined && accWithG.x !== null) ? accWithG.x : 0;
                let rawY = (accWithG.y !== undefined && accWithG.y !== null) ? accWithG.y : 0;
                let rawZ = (accWithG.z !== undefined && accWithG.z !== null) ? accWithG.z : 0;
                
                // 显示原始含重力数据（转换为 Gal，保留两位小数，展示高分辨率）
                rawXSpan.innerText = (rawX * 100).toFixed(2);
                rawYSpan.innerText = (rawY * 100).toFixed(2);
                rawZSpan.innerText = (rawZ * 100).toFixed(2);
                
                // 第一帧：用当前值初始化重力估计（假设起始时接近静止）
                if (firstFrame) {
                    gravityEst = { x: rawX, y: rawY, z: rawZ };
                    firstFrame = false;
                    // 初始时刻线性加速度显示为 0
                    linXSpan.innerText = (0).toFixed(2);
                    linYSpan.innerText = (0).toFixed(2);
                    linZSpan.innerText = (0).toFixed(2);
                    return;
                }
                
                // 低通滤波更新重力估计
                gravityEst.x = alpha * rawX + (1 - alpha) * gravityEst.x;
                gravityEst.y = alpha * rawY + (1 - alpha) * gravityEst.y;
                gravityEst.z = alpha * rawZ + (1 - alpha) * gravityEst.z;
                
                // 线性加速度 = 含重力 - 估计重力
                let linX = rawX - gravityEst.x;
                let linY = rawY - gravityEst.y;
                let linZ = rawZ - gravityEst.z;
                
                // 转换为 Gal（1 m/s² = 100 Gal）并保留两位小数
                linXSpan.innerText = (linX * 100).toFixed(2);
                linYSpan.innerText = (linY * 100).toFixed(2);
                linZSpan.innerText = (linZ * 100).toFixed(2);
                
                // 更新状态（仅当第一次有数据时）
                if (statusSpan.innerText.includes('等待') || statusSpan.innerText.includes('未授权')) {
                    statusSpan.innerText = '✅ 数据实时更新中（静止时应接近 0 Gal）';
                }
            }
            
            function startListening() {
                if (motionHandler) {
                    window.removeEventListener('devicemotion', motionHandler);
                }
                motionHandler = onDeviceMotion;
                window.addEventListener('devicemotion', motionHandler);
                firstFrame = true;   // 重置重力估计
            }
            
            // 请求权限（iOS 13+）
            function requestSensorPermission() {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                startListening();
                                statusSpan.innerText = '✅ 已授权，正在获取高分辨率数据...';
                            } else {
                                statusSpan.innerText = '❌ 授权失败，无法获取传感器数据';
                            }
                        })
                        .catch(err => {
                            statusSpan.innerText = '❌ 授权出错：' + err.message;
                        });
                } else {
                    // Android 或旧版 iOS 直接启动
                    startListening();
                    statusSpan.innerText = '✅ 自动启动（安卓/旧iOS），静止时应接近 0 Gal';
                }
            }
            
            // 绑定按钮
            const btn = document.getElementById('requestBtn');
            btn.onclick = function() {
                requestSensorPermission();
            };
            
            // 对于 Android 等不需要显式权限的环境，直接启动（但为了兼容 iOS 不自动调用，用户需点按钮）
            // 检测不需要 requestPermission 则自动启动
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission !== 'function') {
                // Android 环境，直接开始
                startListening();
                statusSpan.innerText = '✅ 自动启动（安卓/旧iOS），静止时应接近 0 Gal';
            } else {
                statusSpan.innerText = '🔘 请点击上方按钮授权传感器，以获得高分辨率线性加速度';
            }
        })();
</script> 
<script>
    // 独立图表模块：每秒读取线性加速度显示值，合成后更新曲线（不干扰原算法）
    (function() {
        const canvas = document.getElementById('accelChart');
        if (!canvas) return;
        let chart = null;
        let dataHistory = Array(60).fill(0);
        
        function initChart() {
            const ctx = canvas.getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(60).fill(''),
                    datasets: [{
                        label: '合成线性加速度 (Gal)',
                        data: dataHistory,
                        borderColor: '#ffaa66',
                        backgroundColor: 'rgba(255,170,102,0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    animation: false,
                    plugins: { legend: { labels: { color: '#ddd' } } },
                    scales: {
                        y: { title: { display: true, text: 'Gal', color: '#aaa' }, min: -200, max: 200 },
                        x: { ticks: { display: false } }
                    }
                }
            });
        }
        
        function updateChart() {
            const x = parseFloat(document.getElementById('linX').innerText);
            const y = parseFloat(document.getElementById('linY').innerText);
            const z = parseFloat(document.getElementById('linZ').innerText);
            if (isNaN(x) || isNaN(y) || isNaN(z)) return;
            const total = Math.sqrt(x*x + y*y + z*z);
            dataHistory.push(total);
            if (dataHistory.length > 60) dataHistory.shift();
            if (chart) {
                chart.data.datasets[0].data = [...dataHistory];
                chart.update();
            }
        }
        
        initChart();
        setInterval(updateChart, 200); // 每200ms更新一次曲线
    })();
</script>
</body>
</html>
