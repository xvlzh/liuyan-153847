<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>高精度加速度监测 · 原始数据</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f1a; font-family: 'Segoe UI', system-ui, monospace; padding: 16px; color: #e0e0e0; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: rgba(20,30,45,0.8); backdrop-filter: blur(4px); border-radius: 32px; padding: 16px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .title { font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; text-align: center; }
        .axis-grid { display: flex; flex-direction: column; gap: 12px; }
        .axis-item { background: rgba(0,0,0,0.4); border-radius: 24px; padding: 12px; }
        .axis-name { font-size: 1rem; font-weight: 500; margin-bottom: 8px; color: #8ab4f8; }
        .values { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; }
        .gal-value { font-size: 1.8rem; font-weight: bold; font-family: 'Courier New', monospace; color: #ffd966; }
        .unit { font-size: 0.9rem; color: #aaa; }
        .raw-value { font-size: 0.85rem; color: #aaa; }
        .peak-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.8rem; border-top: 1px solid #334; padding-top: 8px; }
        .intensity-box { display: flex; justify-content: space-between; margin-top: 10px; background: #1e2a3a; border-radius: 20px; padding: 8px 12px; }
        .intensity-label { font-weight: 500; }
        .intensity-value { font-weight: bold; color: #ffaa66; }
        .canvas-container { background: #0a0f1a; border-radius: 20px; padding: 8px; margin-top: 8px; }
        canvas { width: 100%; height: 160px; display: block; }
        .control-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; justify-content: center; }
        button { background: #2c3e50; border: none; color: white; font-size: 0.8rem; padding: 6px 14px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .slider-label { display: flex; align-items: center; gap: 8px; background: #1e2a3a; padding: 4px 12px; border-radius: 40px; }
        input[type="range"] { width: 120px; }
        .status { text-align: center; font-size: 0.75rem; color: #88ffaa; margin-top: 10px; }
        .debug { font-size: 0.65rem; color: #888; text-align: center; margin-top: 8px; }
        footer { font-size: 0.65rem; text-align: center; color: #666; margin-top: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="title">📳 加速度实时监测 · 原始数据</div>
        <div class="axis-grid">
            <div class="axis-item">
                <div class="axis-name">📐 X 轴</div>
                <div class="values">
                    <span><span class="gal-value" id="x_gal">0.000</span> <span class="unit">gal</span></span>
                    <span class="raw-value" id="x_raw">0.000 m/s²</span>
                </div>
                <div class="peak-row">
                    <span>峰值: <span id="x_peak_gal">0.000</span> gal</span>
                    <span id="x_peak_time"></span>
                </div>
            </div>
            <div class="axis-item">
                <div class="axis-name">📐 Y 轴</div>
                <div class="values">
                    <span><span class="gal-value" id="y_gal">0.000</span> <span class="unit">gal</span></span>
                    <span class="raw-value" id="y_raw">0.000 m/s²</span>
                </div>
                <div class="peak-row">
                    <span>峰值: <span id="y_peak_gal">0.000</span> gal</span>
                    <span id="y_peak_time"></span>
                </div>
            </div>
            <div class="axis-item">
                <div class="axis-name">📐 Z 轴</div>
                <div class="values">
                    <span><span class="gal-value" id="z_gal">0.000</span> <span class="unit">gal</span></span>
                    <span class="raw-value" id="z_raw">0.000 m/s²</span>
                </div>
                <div class="peak-row">
                    <span>峰值: <span id="z_peak_gal">0.000</span> gal</span>
                    <span id="z_peak_time"></span>
                </div>
            </div>
        </div>
        <div class="intensity-box">
            <span class="intensity-label">🇨🇳 中国烈度</span>
            <span class="intensity-value" id="china_intensity">Ⅰ (无感)</span>
            <span class="intensity-label">🇯🇵 日本震度</span>
            <span class="intensity-value" id="japan_intensity">0</span>
        </div>
    </div>

    <div class="card">
        <div class="title">📈 合成加速度曲线</div>
        <div class="canvas-container">
            <canvas id="accelChart" width="400" height="160"></canvas>
        </div>
        <div class="control-bar">
            <button id="toggleUnitBtn">📏 显示 gal</button>
            <button id="calibrateBtn">⚖️ 归零校准</button>
            <div class="slider-label">
                <span>📊 曲线范围 ±</span>
                <input type="range" id="rangeSlider" min="5" max="500" value="100" step="5">
                <span id="rangeValue">100</span><span> gal</span>
            </div>
            <div class="slider-label">
                <span>⏱️ 更新速度</span>
                <input type="range" id="speedSlider" min="30" max="300" value="100" step="10">
                <span id="speedValue">100</span><span> ms</span>
            </div>
        </div>
    </div>

    <div class="status" id="statusMsg">⚡ 点击下方按钮授权传感器</div>
    <button id="requestBtn" style="width:100%; background:#4c6a8a;">🔘 请求传感器权限</button>
    <div id="debugInfo" class="debug"></div>
    <footer>原始线性加速度 | 归零校准可消除静止偏差 | 震度上升播放音效</footer>
</div>
<script>
    // DOM 元素
    const xGalSpan = document.getElementById('x_gal');
    const yGalSpan = document.getElementById('y_gal');
    const zGalSpan = document.getElementById('z_gal');
    const xRawSpan = document.getElementById('x_raw');
    const yRawSpan = document.getElementById('y_raw');
    const zRawSpan = document.getElementById('z_raw');
    const xPeakSpan = document.getElementById('x_peak_gal');
    const yPeakSpan = document.getElementById('y_peak_gal');
    const zPeakSpan = document.getElementById('z_peak_gal');
    const xPeakTimeSpan = document.getElementById('x_peak_time');
    const yPeakTimeSpan = document.getElementById('y_peak_time');
    const zPeakTimeSpan = document.getElementById('z_peak_time');
    const chinaSpan = document.getElementById('china_intensity');
    const japanSpan = document.getElementById('japan_intensity');
    const statusDiv = document.getElementById('statusMsg');
    const debugDiv = document.getElementById('debugInfo');
    const requestBtn = document.getElementById('requestBtn');
    const calibrateBtn = document.getElementById('calibrateBtn');
    const toggleUnitBtn = document.getElementById('toggleUnitBtn');
    const rangeSlider = document.getElementById('rangeSlider');
    const rangeValueSpan = document.getElementById('rangeValue');
    const speedSlider = document.getElementById('speedSlider');
    const speedValueSpan = document.getElementById('speedValue');

    // 状态变量
    let motionEnabled = false;
    let updateInterval = 100;
    let lastTimestamp = 0;
    let audioAllowed = false;
    let lastPlayTime = 0;
    const DEBOUNCE_MS = 350;   // 防抖时间改为 350 毫秒
    let lastJapanIntensity = "0";

    let dataArray = [];
    let chart = null;

    let peaks = { x: 0, y: 0, z: 0 };
    let peakTimes = { x: "", y: "", z: "" };

    let offset = { x: 0, y: 0, z: 0 };
    let calibrating = false;
    let calibrateSamples = [];

    let displayUnit = "gal";

    // 烈度映射
    function getChinaIntensity(gal) {
        if (gal < 0.5) return "Ⅰ (无感)";
        if (gal < 1.2) return "Ⅱ";
        if (gal < 2.5) return "Ⅲ";
        if (gal < 5.0) return "Ⅳ";
        if (gal < 10) return "Ⅴ";
        if (gal < 22) return "Ⅵ";
        if (gal < 45) return "Ⅶ";
        if (gal < 90) return "Ⅷ";
        if (gal < 180) return "Ⅸ";
        if (gal < 350) return "Ⅹ";
        if (gal < 700) return "Ⅺ";
        return "Ⅻ";
    }
    function getJapanIntensity(gal) {
        if (gal < 0.8) return "0";
        if (gal < 2.5) return "1";
        if (gal < 8.0) return "2";
        if (gal < 25) return "3";
        if (gal < 80) return "4";
        if (gal < 140) return "5弱";
        if (gal < 250) return "5强";
        if (gal < 400) return "6弱";
        if (gal < 700) return "6强";
        return "7";
    }
    function japanIntensityValue(intensity) {
        const map = { "0":0,"1":1,"2":2,"3":3,"4":4,"5弱":5.1,"5强":5.5,"6弱":6.1,"6强":6.5,"7":7 };
        return map[intensity] !== undefined ? map[intensity] : 0;
    } 
// 音频播放
function playBeepByIntensity(japanIntensity) {
    if (!audioAllowed) return;
    const now = Date.now();
    if (now - lastPlayTime < DEBOUNCE_MS) return;
    const map = { "0":"shindo0","1":"shindo1","2":"shindo2","3":"shindo3","4":"shindo4","5弱":"shindo5","5强":"shindo5","6弱":"shindo6","6强":"shindo6","7":"shindo7" };
    const name = map[japanIntensity];
    if (!name) return;
    const audio = new Audio(`/${name}.mp3`);
    audio.play().catch(e => console.log("音频失败", e));
    lastPlayTime = now;
}

// 原始数据更新UI（无任何平滑滤波）
function updateUI(ax, ay, az, rawX, rawY, rawZ) {
    // 应用归零偏移
    let displayX = ax - offset.x;
    let displayY = ay - offset.y;
    let displayZ = az - offset.z;
    let total = Math.sqrt(displayX*displayX + displayY*displayY + displayZ*displayZ);
    
    // 更新峰值（使用偏移后的值）
    if (Math.abs(displayX) > peaks.x) {
        peaks.x = Math.abs(displayX);
        peakTimes.x = new Date().toLocaleTimeString();
        xPeakSpan.innerText = peaks.x.toFixed(3);
        document.getElementById('x_peak_time').innerText = peakTimes.x;
    }
    if (Math.abs(displayY) > peaks.y) {
        peaks.y = Math.abs(displayY);
        peakTimes.y = new Date().toLocaleTimeString();
        yPeakSpan.innerText = peaks.y.toFixed(3);
        document.getElementById('y_peak_time').innerText = peakTimes.y;
    }
    if (Math.abs(displayZ) > peaks.z) {
        peaks.z = Math.abs(displayZ);
        peakTimes.z = new Date().toLocaleTimeString();
        zPeakSpan.innerText = peaks.z.toFixed(3);
        document.getElementById('z_peak_time').innerText = peakTimes.z;
    }

    // 显示当前值（三位小数）
    if (displayUnit === "gal") {
        xGalSpan.innerText = displayX.toFixed(3);
        yGalSpan.innerText = displayY.toFixed(3);
        zGalSpan.innerText = displayZ.toFixed(3);
        xRawSpan.innerText = rawX.toFixed(3) + " m/s²";
        yRawSpan.innerText = rawY.toFixed(3) + " m/s²";
        zRawSpan.innerText = rawZ.toFixed(3) + " m/s²";
    } else {
        xGalSpan.innerText = (displayX * 0.01).toFixed(3);
        yGalSpan.innerText = (displayY * 0.01).toFixed(3);
        zGalSpan.innerText = (displayZ * 0.01).toFixed(3);
        xRawSpan.innerText = rawX.toFixed(3) + " m/s²";
        yRawSpan.innerText = rawY.toFixed(3) + " m/s²";
        zRawSpan.innerText = rawZ.toFixed(3) + " m/s²";
    }

    // 烈度震度基于合成加速度（原始值）
    const china = getChinaIntensity(total);
    const japan = getJapanIntensity(total);
    chinaSpan.innerText = china;
    japanSpan.innerText = japan;
    const prevVal = japanIntensityValue(lastJapanIntensity);
    const curVal = japanIntensityValue(japan);
    if (curVal > prevVal) {
        playBeepByIntensity(japan);
        document.body.style.transition = "background 0.1s";
        document.body.style.background = "#3a2a2a";
        setTimeout(() => document.body.style.background = "", 200);
    }
    lastJapanIntensity = japan;

    // 图表数据使用合成加速度
    dataArray.push(total);
    if (dataArray.length > 60) dataArray.shift();
    if (chart) {
        chart.data.datasets[0].data = [...dataArray];
        chart.options.scales.y.max = parseFloat(rangeSlider.value);
        chart.options.scales.y.min = -parseFloat(rangeSlider.value);
        chart.update();
    }
    debugDiv.innerText = `📊 合成加速度: ${total.toFixed(3)} gal | 偏移 X:${offset.x.toFixed(3)} Y:${offset.y.toFixed(3)} Z:${offset.z.toFixed(3)}`;
}  
    function initChart() {
        const ctx = document.getElementById('accelChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(60).fill(''),
                datasets: [{
                    label: '合成加速度 (gal)',
                    data: new Array(60).fill(0),
                    borderColor: '#ffaa66',
                    backgroundColor: 'rgba(255,170,102,0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                animation: false,
                plugins: { legend: { labels: { color: '#ddd' } } },
                scales: {
                    y: { title: { display: true, text: 'gal', color: '#aaa' }, min: -100, max: 100, grid: { color: '#335' } },
                    x: { ticks: { display: false } }
                }
            }
        });
        dataArray = new Array(60).fill(0);
        chart.data.datasets[0].data = dataArray;
        chart.update();
    }

    // 事件绑定
    toggleUnitBtn.addEventListener('click', () => {
        displayUnit = displayUnit === "gal" ? "ms2" : "gal";
        toggleUnitBtn.innerText = displayUnit === "gal" ? "📏 显示 gal" : "📏 显示 m/s²";
    });
    calibrateBtn.addEventListener('click', startCalibration);
    rangeSlider.addEventListener('input', (e) => {
        let val = parseInt(e.target.value);
        rangeValueSpan.innerText = val;
        if (chart) {
            chart.options.scales.y.max = val;
            chart.options.scales.y.min = -val;
            chart.update();
        }
    });
    speedSlider.addEventListener('input', (e) => {
        updateInterval = parseInt(e.target.value);
        speedValueSpan.innerText = updateInterval;
    });
    requestBtn.addEventListener('click', requestSensorPermission);

    initChart();
    if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
        statusDiv.innerText = '📱 iOS 需要点击按钮授权';
    } else {
        statusDiv.innerText = '🟢 点击“请求传感器权限”开始监测';
    }
</script>
</body>
</html>
