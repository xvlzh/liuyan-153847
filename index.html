<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>线性加速度 - 纯文字显示</title>
    <!-- 没有任何CSS样式，纯浏览器默认外观 -->
</head>
<body>
    <h3>手机线性加速度（单位：Gal）</h3>
    <p>X轴: <span id="ax">--</span> Gal</p>
    <p>Y轴: <span id="ay">--</span> Gal</p>
    <p>Z轴: <span id="az">--</span> Gal</p>
    <hr>
    <p id="status">等待授权/数据...</p>
    <button id="requestBtn">授权传感器（iOS必需，Android点不点都行）</button>

    <script>
        (function() {
            let motionHandler = null;

            function updateDisplay(event) {
                const acc = event.acceleration;
                if (!acc) {
                    document.getElementById('status').innerText = '当前设备不支持 acceleration 字段';
                    return;
                }
                // 获取各轴数值（m/s²），null/undefined 则当作0
                let x = (acc.x !== undefined && acc.x !== null) ? acc.x : 0;
                let y = (acc.y !== undefined && acc.y !== null) ? acc.y : 0;
                let z = (acc.z !== undefined && acc.z !== null) ? acc.z : 0;
                // 转换为 Gal: 1 m/s² = 100 Gal，保留两位小数，精确到0.01 Gal
                document.getElementById('ax').innerText = (x * 100).toFixed(2);
                document.getElementById('ay').innerText = (y * 100).toFixed(2);
                document.getElementById('az').innerText = (z * 100).toFixed(2);
                document.getElementById('status').innerText = '数据实时更新中（静止时接近0）';
            }

            function startListening() {
                if (motionHandler) {
                    window.removeEventListener('devicemotion', motionHandler);
                }
                motionHandler = updateDisplay;
                window.addEventListener('devicemotion', motionHandler);
            }

            // 请求权限（主要针对 iOS 13+）
            function requestSensorPermission() {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    // iOS 需要用户点击授权
                    DeviceMotionEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                startListening();
                                document.getElementById('status').innerText = '已授权，正在获取数据...';
                            } else {
                                document.getElementById('status').innerText = '授权失败，无法获取传感器数据';
                            }
                        })
                        .catch(err => {
                            document.getElementById('status').innerText = '授权出错：' + err.message;
                        });
                } else {
                    // Android 或旧版 iOS 直接启动
                    startListening();
                    document.getElementById('status').innerText = '已启动监听（无需授权或已支持）';
                }
            }

            // 绑定按钮事件
            const btn = document.getElementById('requestBtn');
            btn.onclick = function(e) {
                requestSensorPermission();
            };

            // 对于 Android 等不需要授权的情况，也可以自动尝试启动（但为避免iOS异常，不自动调用，让用户点按钮）
            // 为了更友好：检测如果不是 iOS 请求权限模式，直接自动开始监听
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission !== 'function') {
                // Android 环境，直接启动
                startListening();
                document.getElementById('status').innerText = '自动启动（安卓/旧iOS）';
            } else {
                document.getElementById('status').innerText = '请点击上方的按钮授权传感器';
            }
        })();
    </script>
</body>
</html>
