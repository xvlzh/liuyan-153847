<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>加速度监测仪 · 烈度震度曲线</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, monospace;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 1.6rem;
            margin-bottom: 16px;
        }
        .card {
            background: rgba(0,0,0,0.5);
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #e0e0e0;
            font-size: 1rem;
        }
        .data-label {
            font-weight: 600;
            color: #a0d6ff;
        }
        .data-value {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #ffd966;
        }
        .intensity-value {
            font-size: 1.2rem;
            background: #2c3e50;
            padding: 0 8px;
            border-radius: 20px;
        }
        .canvas-container {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 10px;
            margin: 15px 0;
        }
        canvas {
            width: 100%;
            height: 180px;
            display: block;
        }
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        button {
            background: #4caf50;
            border: none;
            color: white;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .slider-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 0.8rem;
        }
        input[type="range"] {
            width: 150px;
        }
        .status {
            text-align: center;
            color: #ffaa66;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #ccc;
            margin-top: 20px;
        }
        .blink-bg {
            animation: blinkBg 0.3s ease;
        }
        @keyframes blinkBg {
            0% { background: rgba(255,80,80,0.3); }
            100% { background: rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📳 加速度监测仪</h1>
    <div class="card" id="dataCard">
        <div class="data-row">
            <span class="data-label">加速度 X (gal)</span>
            <span class="data-value" id="accel-x">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">加速度 Y (gal)</span>
            <span class="data-value" id="accel-y">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">加速度 Z (gal)</span>
            <span class="data-value" id="accel-z">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">合成加速度 (gal)</span>
            <span class="data-value" id="total-accel">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">中国地震烈度</span>
            <span class="data-value intensity-value" id="intensity-china">Ⅰ</span>
        </div>
        <div class="data-row">
            <span class="data-label">日本震度 (JMA)</span>
            <span class="data-value intensity-value" id="intensity-japan">0</span>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="accelChart" width="400" height="180"></canvas>
    </div>

    <div class="control-bar">
        <button id="toggleGravityBtn">📊 显示线性加速度</button>
        <button id="togglePrecisionBtn">🔢 精度: 0.1 gal</button>
        <div class="slider-label">
            <span>🐢 更新速度</span>
            <input type="range" id="speedSlider" min="50" max="500" value="200" step="10">
            <span id="speedValue">200</span><span>ms</span>
        </div>
    </div>
    <div class="status" id="statusMsg">⚡ 点击下方按钮授权传感器</div>
    <button id="requestBtn" class="permission-btn" style="width:100%;">🔘 请求传感器权限</button>
    <footer>曲线显示最近30次合成加速度 | 震度上升时播放对应音效 | 可调刷新率</footer>
</div>
<script>
    // ---------- DOM 元素 ----------
    const accelXSpan = document.getElementById('accel-x');
    const accelYSpan = document.getElementById('accel-y');
    const accelZSpan = document.getElementById('accel-z');
    const totalSpan = document.getElementById('total-accel');
    const intensityChinaSpan = document.getElementById('intensity-china');
    const intensityJapanSpan = document.getElementById('intensity-japan');
    const statusDiv = document.getElementById('statusMsg');
    const requestBtn = document.getElementById('requestBtn');
    const toggleGravityBtn = document.getElementById('toggleGravityBtn');
    const togglePrecisionBtn = document.getElementById('togglePrecisionBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedValueSpan = document.getElementById('speedValue');

    // ---------- 状态变量 ----------
    let motionEnabled = false;
    let showGravity = true;          // true: 显示含重力加速度; false: 显示线性加速度
    let precision = 0.1;             // 显示精度: 0.1 或 1
    let updateInterval = 200;        // ms
    let lastJapanIntensity = "0";    // 记录上一次震度字符串
    let dataArray = [];              // 存储合成加速度用于图表，最多30点
    let chart = null;                // Chart.js 实例
    let audioAllowed = false;        // 是否允许播放音频（需用户交互后）
    let lastPlayTime = 0;            // 简单防抖：1秒内不重复播放
    const DEBOUNCE_MS = 1000;

    // ---------- 震度音频映射 ----------
    function getAudioForIntensity(japanIntensity) {
        const map = {
            "0": "shindo0",
            "1": "shindo1",
            "2": "shindo2",
            "3": "shindo3",
            "4": "shindo4",
            "5弱": "shindo5",
            "5强": "shindo5",
            "6弱": "shindo6",
            "6强": "shindo6",
            "7": "shindo7"
        };
        const name = map[japanIntensity];
        return name ? `/${name}.mp3` : null;
    }

    function playBeepByIntensity(japanIntensity) {
        if (!audioAllowed) return;
        const now = Date.now();
        if (now - lastPlayTime < DEBOUNCE_MS) return; // 防抖，避免连续快速播放
        const url = getAudioForIntensity(japanIntensity);
        if (!url) return;
        const audio = new Audio(url);
        audio.play().catch(e => console.log("音频播放失败", e));
        lastPlayTime = now;
    }

    // ---------- 烈度/震度映射 (基于 gal) ----------
    function getChinaIntensity(gal) {
        if (gal < 0.5) return "Ⅰ (无感)";
        if (gal < 1.2) return "Ⅱ";
        if (gal < 2.5) return "Ⅲ";
        if (gal < 5.0) return "Ⅳ";
        if (gal < 10) return "Ⅴ";
        if (gal < 22) return "Ⅵ";
        if (gal < 45) return "Ⅶ";
        if (gal < 90) return "Ⅷ";
        if (gal < 180) return "Ⅸ";
        if (gal < 350) return "Ⅹ";
        if (gal < 700) return "Ⅺ";
        return "Ⅻ";
    }

    function getJapanIntensity(gal) {
        if (gal < 0.8) return "0";
        if (gal < 2.5) return "1";
        if (gal < 8.0) return "2";
        if (gal < 25) return "3";
        if (gal < 80) return "4";
        if (gal < 140) return "5弱";
        if (gal < 250) return "5强";
        if (gal < 400) return "6弱";
        if (gal < 700) return "6强";
        return "7";
    }

    // 将震度字符串转换为数值以便比较大小
    function japanIntensityValue(intensity) {
        const map = {
            "0": 0, "1": 1, "2": 2, "3": 3, "4": 4,
            "5弱": 5.1, "5强": 5.5, "6弱": 6.1, "6强": 6.5, "7": 7
        };
        return map[intensity] !== undefined ? map[intensity] : 0;
    }

    // ---------- 更新UI ----------
    function updateUI(ax, ay, az, total) {
        // 精度处理
        let toFixedVal = precision === 0.1 ? 1 : 0;
        accelXSpan.innerText = ax.toFixed(toFixedVal);
        accelYSpan.innerText = ay.toFixed(toFixedVal);
        accelZSpan.innerText = az.toFixed(toFixedVal);
        totalSpan.innerText = total.toFixed(toFixedVal);
        
        const china = getChinaIntensity(total);
        const japan = getJapanIntensity(total);
        intensityChinaSpan.innerText = china;
        intensityJapanSpan.innerText = japan;
        
        // 震度变大时播放音频并闪烁
        const prevVal = japanIntensityValue(lastJapanIntensity);
        const curVal = japanIntensityValue(japan);
        if (curVal > prevVal) {
            playBeepByIntensity(japan);
            // 闪烁效果
            const card = document.getElementById('dataCard');
            card.classList.add('blink-bg');
            setTimeout(() => card.classList.remove('blink-bg'), 300);
        }
        lastJapanIntensity = japan;
        
        // 更新图表
        dataArray.push(total);
        if (dataArray.length > 30) dataArray.shift();
        if (chart) {
            chart.data.datasets[0].data = [...dataArray];
            chart.update();
        }
    }

    // 线性加速度死区处理 (小于 ±10 gal 归零)
    function applyDeadzone(val) {
        return Math.abs(val) < 10 ? 0 : val;
    }

    // ---------- 传感器数据处理 ----------
    let lastTimestamp = 0;
    function handleMotion(event) {
        if (!motionEnabled) return;
        const now = Date.now();
        if (now - lastTimestamp < updateInterval) return;
        lastTimestamp = now;
        
        let ax = 0, ay = 0, az = 0;
        if (showGravity && event.accelerationIncludingGravity) {
            ax = (event.accelerationIncludingGravity.x || 0) * 100;
            ay = (event.accelerationIncludingGravity.y || 0) * 100;
            az = (event.accelerationIncludingGravity.z || 0) * 100;
        } else if (!showGravity && event.acceleration) {
            ax = (event.acceleration.x || 0) * 100;
            ay = (event.acceleration.y || 0) * 100;
            az = (event.acceleration.z || 0) * 100;
            // 线性加速度应用死区
            ax = applyDeadzone(ax);
            ay = applyDeadzone(ay);
            az = applyDeadzone(az);
        } else if (event.accelerationIncludingGravity) {
            // fallback
            ax = (event.accelerationIncludingGravity.x || 0) * 100;
            ay = (event.accelerationIncludingGravity.y || 0) * 100;
            az = (event.accelerationIncludingGravity.z || 0) * 100;
        }
        const total = Math.sqrt(ax*ax + ay*ay + az*az);
        updateUI(ax, ay, az, total);
    }

    // ---------- 权限请求 ----------
    function requestSensorPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        enableMotion();
                    } else {
                        statusDiv.innerText = '❌ 权限被拒绝';
                    }
                })
                .catch(err => statusDiv.innerText = '⚠️ 授权失败');
        } else {
            enableMotion();
        }
    }

    function enableMotion() {
        motionEnabled = true;
        audioAllowed = true;   // 用户已交互，允许音频
        statusDiv.innerText = '✅ 监测已启动 | 震度上升时播放音效';
        window.addEventListener('devicemotion', handleMotion);
    }
</body>
</html>
