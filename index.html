<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>高分辨率加速度监测 · 专业版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a0f1a, #121a2a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: rgba(20, 30, 45, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #b8d0f0;
            margin-bottom: 18px;
            border-left: 4px solid #ffaa66;
            padding-left: 14px;
        }
        .data-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
        }
        .data-item {
            flex: 1 0 40%;
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .data-label {
            color: #9ab0d0;
            font-weight: 500;
        }
        .data-value {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #ffd966;
            font-size: 1.3rem;
        }
        .raw-data {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #b0c8e0;
        }
        .raw-data span {
            font-family: monospace;
            color: #aaccff;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }
        button {
            background: #2c4058;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 10px 22px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            flex: 1 0 auto;
        }
        button:active {
            transform: scale(0.95);
        }
        #requestBtn {
            background: #4a6a8a;
        }
        #calibrateBtn {
            background: #5a7a5a;
        }
        .status {
            margin-top: 12px;
            color: #88ffaa;
            font-size: 0.9rem;
            text-align: center;
        }
        .chart-wrap {
            margin-top: 12px;
            background: #0a0f1a;
            border-radius: 20px;
            padding: 10px;
        }
        canvas {
            width: 100%;
            height: 200px;
            display: block;
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #6a7a8a;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
        <!-- 线性加速度卡片 -->
    <div class="card">
        <div class="card-title">线性加速度 (高通滤波)</div>
        <div class="data-grid">
            <div class="data-item"><span class="data-label">X 轴</span><span class="data-value" id="linX">--</span></div>
            <div class="data-item"><span class="data-label">Y 轴</span><span class="data-value" id="linY">--</span></div>
            <div class="data-item"><span class="data-label">Z 轴</span><span class="data-value" id="linZ">--</span></div>
            <div class="data-item"><span class="data-label">合成加速度</span><span class="data-value" id="totalAccel">--</span></div>
        </div>
        <div class="raw-data">
            <div style="margin-bottom:6px;">原始含重力数据 (对比分辨率)</div>
            <div>X: <span id="rawX">--</span> Gal &nbsp;|&nbsp; Y: <span id="rawY">--</span> Gal &nbsp;|&nbsp; Z: <span id="rawZ">--</span> Gal</div>
        </div>
    </div>

    <!-- 控制卡片 -->
    <div class="card">
        <div class="button-group">
            <button id="requestBtn">授权传感器</button>
            <button id="calibrateBtn">归零校准</button>
        </div>
        <div id="status" class="status">⚡ 等待授权 / 数据...</div>
    </div>

    <!-- 曲线图卡片 -->
    <div class="card">
        <div class="card-title">合成加速度曲线</div>
        <div class="chart-wrap">
            <canvas id="accelChart"></canvas>
        </div>
    </div>
    <footer>核心算法 (my_algorithm.js)  ·  曲线Y轴自动缩放  ·  归零校准仅修正合成加速度</footer>
</div>
        <script src="my_algorithm.js"></script>


    <script>
    (function() {
        // ---------- 归零偏移 ----------
        let offset = { x: 0, y: 0, z: 0 };
        let chart = null;
        let dataHistory = Array(60).fill(0);

        // ---------- 震度映射 ----------
        function getJapanIntensity(gal) {
            if (gal < 0.8) return "0";
            if (gal < 2.5) return "1";
            if (gal < 8.0) return "2";
            if (gal < 25) return "3";
            if (gal < 80) return "4";
            if (gal < 140) return "5弱";
            if (gal < 250) return "5强";
            if (gal < 400) return "6弱";
            if (gal < 700) return "6强";
            return "7";
        }
        function japanVal(intensity) {
            const map = { "0":0,"1":1,"2":2,"3":3,"4":4,"5弱":5.1,"5强":5.5,"6弱":6.1,"6强":6.5,"7":7 };
            return map[intensity] !== undefined ? map[intensity] : 0;
        }

        // ---------- 音频播放 ----------
        let audioAllowed = false;
        let lastJapan = "0";
        let lastPlayTime = 0;
        const DEBOUNCE_MS = 350;

        function playBeep(intensity) {
            if (!audioAllowed) return;
            const now = Date.now();
            if (now - lastPlayTime < DEBOUNCE_MS) return;
            const map = {
                "0":"shindo0","1":"shindo1","2":"shindo2","3":"shindo3","4":"shindo4",
                "5弱":"shindo5","5强":"shindo5","6弱":"shindo6","6强":"shindo6","7":"shindo7"
            };
            const name = map[intensity];
            if (!name) return;
            const audio = new Audio(`/${name}.mp3`);
            audio.play().catch(e => console.log("音频播放失败", e));
            lastPlayTime = now;
        }

        // ---------- 图表初始化 ----------
        function initChart() {
            const ctx = document.getElementById('accelChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(60).fill(''),
                    datasets: [{
                        label: '合成加速度 (Gal)',
                        data: dataHistory,
                        borderColor: '#ffaa66',
                        backgroundColor: 'rgba(255,170,102,0.15)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    animation: false,
                    plugins: {
                        legend: { labels: { color: '#ccc' } }
                    },
                    scales: {
                        y: {
                            title: { display: true, text: 'Gal', color: '#aaa' },
                            min: -10,
                            max: 10,
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        x: { ticks: { display: false } }
                    }
                }
            });
        }

        // ---------- 更新合成加速度、图表、震度音效 ----------
        function updateTotalAndChart() {
            const rawX = parseFloat(document.getElementById('linX').innerText);
            const rawY = parseFloat(document.getElementById('linY').innerText);
            const rawZ = parseFloat(document.getElementById('linZ').innerText);
            if (isNaN(rawX) || isNaN(rawY) || isNaN(rawZ)) return;

            const adjX = rawX - offset.x;
            const adjY = rawY - offset.y;
            const adjZ = rawZ - offset.z;
            const total = Math.sqrt(adjX*adjX + adjY*adjY + adjZ*adjZ);
            document.getElementById('totalAccel').innerText = total.toFixed(2);

            // 震度计算与音效
            const japan = getJapanIntensity(total);
            const prevVal = japanVal(lastJapan);
            const curVal = japanVal(japan);
            if (curVal > prevVal) {
                playBeep(japan);
                // 简单闪烁提示（可选）
                document.body.style.transition = 'background 0.1s';
                document.body.style.background = '#3a2a2a';
                setTimeout(() => document.body.style.background = '', 200);
            }
            lastJapan = japan;

            // 更新图表
            dataHistory.push(total);
            if (dataHistory.length > 60) dataHistory.shift();
            if (chart) {
                chart.data.datasets[0].data = [...dataHistory];
                // 自动调节 Y 轴范围
                const maxVal = Math.max(...dataHistory);
                const minVal = Math.min(...dataHistory);
                const absMax = Math.max(Math.abs(maxVal), Math.abs(minVal), 1);
                let yMax = absMax * 1.1;
                let yMin = -yMax;
                if (yMax < 10) { yMax = 10; yMin = -10; }
                chart.options.scales.y.max = yMax;
                chart.options.scales.y.min = yMin;
                chart.update();
            }
        }

        // ---------- 归零校准 ----------
        function calibrate() {
            const rawX = parseFloat(document.getElementById('linX').innerText);
            const rawY = parseFloat(document.getElementById('linY').innerText);
            const rawZ = parseFloat(document.getElementById('linZ').innerText);
            if (!isNaN(rawX) && !isNaN(rawY) && !isNaN(rawZ)) {
                offset = { x: rawX, y: rawY, z: rawZ };
                updateTotalAndChart();
                document.getElementById('status').innerText = '归零校准完成，合成加速度归零';
                setTimeout(() => {
                    const statusEl = document.getElementById('status');
                    if (statusEl.innerText === '归零校准完成，合成加速度归零')
                        statusEl.innerText = '数据实时更新中';
                }, 2000);
            }
        }

        // ---------- 绑定按钮、初始化 ----------
        document.getElementById('calibrateBtn').addEventListener('click', calibrate);
        initChart();
        setInterval(updateTotalAndChart, 100);

        // 当用户点击“授权传感器”时，允许音频播放（浏览器策略要求）
        const origBtn = document.getElementById('requestBtn');
        const origClick = origBtn.onclick;
        origBtn.onclick = function(e) {
            audioAllowed = true;
            if (origClick) origClick(e);
        };
        // 如果 Android 自动启动，音频暂不允许，但用户点击按钮后会启用
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission !== 'function') {
            // Android 下，点击授权按钮也会触发 audioAllowed = true，所以没问题
        }
    })();
    </script>
</body>
</html>
