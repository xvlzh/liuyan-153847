<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>高精度加速度监测仪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1a, #101520);
            font-family: 'Segoe UI', system-ui, monospace;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
        }
        .card {
            background: rgba(20, 30, 45, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 20px 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .label {
            font-weight: 500;
            color: #a0c0f0;
        }
        .value {
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffd966;
        }
        .unit {
            font-size: 0.8rem;
            color: #aaa;
        }
         .small-value {
            font-size: 1.2rem;
        }
        .intensity-box {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            background: #1e2a3a;
            border-radius: 28px;
            padding: 10px 16px;
        }
        .intensity-label {
            font-weight: 500;
        }
        .intensity-value {
            font-weight: bold;
            color: #ffaa66;
        }
        .canvas-container {
            background: #0a0f1a;
            border-radius: 20px;
            padding: 8px;
            margin: 12px 0;
        }
        canvas {
            width: 100%;
            height: 180px;
            display: block;
        }
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0 5px;
            justify-content: center;
        }
        button {
            background: #2c3e50;
            border: none;
            color: white;
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.96);
        }
        .slider-label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e2a3a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
        }
        input[type="range"] {
            width: 120px;
        }
        .status {
            text-align: center;
            font-size: 0.75rem;
            color: #88ffaa;
            margin-top: 10px;
        }
        .debug {
            font-size: 0.65rem;
            color: #888;
            text-align: center;
            margin-top: 8px;
        }
        footer {
            font-size: 0.65rem;
            text-align: center;
            color: #666;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="container">
<div class="card">
    <div class="data-row">
        <span class="label">X 轴</span>
        <span><span class="value" id="ax">0.00</span><span class="unit"> Gal</span></span>
    </div>
    <div class="data-row">
        <span class="label">Y 轴</span>
        <span><span class="value" id="ay">0.00</span><span class="unit"> Gal</span></span>
    </div>
    <div class="data-row">
        <span class="label">Z 轴</span>
        <span><span class="value" id="az">0.00</span><span class="unit"> Gal</span></span>
    </div>
    <div class="data-row">
        <span class="label">合成加速度</span>
        <span><span class="value" id="total">0.00</span><span class="unit"> Gal</span></span>
    </div>
    <div class="intensity-box">
        <span class="intensity-label">中国烈度</span>
        <span class="intensity-value" id="china_intensity">Ⅰ (无感)</span>
        <span class="intensity-label">日本震度</span>
        <span class="intensity-value" id="japan_intensity">0</span>
    </div>
</div>
    <div class="card">
        <div class="canvas-container">
            <canvas id="accelChart" width="400" height="180"></canvas>
        </div>
        <div class="control-bar">
            <button id="calibrateBtn">归零校准</button>
            <div class="slider-label">
                <span>曲线范围 +-</span>
                <input type="range" id="rangeSlider" min="5" max="500" value="100" step="5">
                <span id="rangeValue">100</span><span> Gal</span>
            </div>
            <div class="slider-label">
                <span>更新速度</span>
                <input type="range" id="speedSlider" min="30" max="200" value="100" step="10">
                <span id="speedValue">100</span><span> ms</span>
            </div>
        </div>
    </div>

    <div class="card" style="text-align: center;">
        <button id="requestBtn" style="background:#4c6a8a; padding:10px 20px;">授权传感器</button>
        <div id="status" class="status">等待授权或数据...</div>
        <div id="debugInfo" class="debug"></div>
    </div>
    <footer>原始线性加速度 | 归零校准消除静止偏差 | 单位 Gal (1 Gal = 1 cm/s²)</footer>
</div>
<script>
    // DOM 元素
    const axSpan = document.getElementById('ax');
    const aySpan = document.getElementById('ay');
    const azSpan = document.getElementById('az');
    const totalSpan = document.getElementById('total');
    const chinaSpan = document.getElementById('china_intensity');
    const japanSpan = document.getElementById('japan_intensity');
    const statusDiv = document.getElementById('status');
    const debugDiv = document.getElementById('debugInfo');
    const requestBtn = document.getElementById('requestBtn');
    const calibrateBtn = document.getElementById('calibrateBtn');
    const rangeSlider = document.getElementById('rangeSlider');
    const rangeValueSpan = document.getElementById('rangeValue');
    const speedSlider = document.getElementById('speedSlider');
    const speedValueSpan = document.getElementById('speedValue');

    let motionHandler = null;
    let lastMotionEvent = null;
    let updateInterval = 100;
    let lastTimestamp = 0;

    let offset = { x: 0, y: 0, z: 0 };
    let calibrating = false;
    let calibrateSamples = [];

    let chart = null;
    let dataArray = [];

    function getChinaIntensity(gal) {
        if (gal < 0.5) return "Ⅰ (无感)";
        if (gal < 1.2) return "Ⅱ";
        if (gal < 2.5) return "Ⅲ";
        if (gal < 5.0) return "Ⅳ";
        if (gal < 10) return "Ⅴ";
        if (gal < 22) return "Ⅵ";
        if (gal < 45) return "Ⅶ";
        if (gal < 90) return "Ⅷ";
        if (gal < 180) return "Ⅸ";
        if (gal < 350) return "Ⅹ";
        if (gal < 700) return "Ⅺ";
        return "Ⅻ";
    }

    function getJapanIntensity(gal) {
        if (gal < 0.8) return "0";
        if (gal < 2.5) return "1";
        if (gal < 8.0) return "2";
        if (gal < 25) return "3";
        if (gal < 80) return "4";
        if (gal < 140) return "5弱";
        if (gal < 250) return "5强";
        if (gal < 400) return "6弱";
        if (gal < 700) return "6强";
        return "7";
    }

    function updateDisplay(event) {
        const acc = event.acceleration;
        if (!acc) {
            statusDiv.innerText = '当前设备不支持 acceleration 字段';
            return;
        }
        let rawX = (acc.x !== undefined && acc.x !== null) ? acc.x : 0;
        let rawY = (acc.y !== undefined && acc.y !== null) ? acc.y : 0;
        let rawZ = (acc.z !== undefined && acc.z !== null) ? acc.z : 0;
        let ax = rawX * 100;
        let ay = rawY * 100;
        let az = rawZ * 100;

        let displayX = ax - offset.x;
        let displayY = ay - offset.y;
        let displayZ = az - offset.z;
        let total = Math.sqrt(displayX*displayX + displayY*displayY + displayZ*displayZ);

        axSpan.innerText = displayX.toFixed(2);
        aySpan.innerText = displayY.toFixed(2);
        azSpan.innerText = displayZ.toFixed(2);
        totalSpan.innerText = total.toFixed(2);

        chinaSpan.innerText = getChinaIntensity(total);
        japanSpan.innerText = getJapanIntensity(total);

        dataArray.push(total);
        if (dataArray.length > 60) dataArray.shift();
        if (chart) {
            chart.data.datasets[0].data = [...dataArray];
            chart.options.scales.y.max = parseFloat(rangeSlider.value);
            chart.options.scales.y.min = -parseFloat(rangeSlider.value);
            chart.update();
        }
        debugDiv.innerText = `偏移 X:${offset.x.toFixed(2)} Y:${offset.y.toFixed(2)} Z:${offset.z.toFixed(2)} | 实时合成:${total.toFixed(2)} Gal`;
    }
    function onDeviceMotion(event) {
        if (!lastMotionEvent) {
            lastMotionEvent = event;
            updateDisplay(event);
            return;
        }
        const now = Date.now();
        if (now - lastTimestamp >= updateInterval) {
            lastTimestamp = now;
            lastMotionEvent = event;
            updateDisplay(event);
        }
    }

    function startListening() {
        if (motionHandler) {
            window.removeEventListener('devicemotion', motionHandler);
        }
        motionHandler = onDeviceMotion;
        window.addEventListener('devicemotion', motionHandler);
        statusDiv.innerText = '已启动监听，数据实时更新';
    }

    function startCalibration() {
        if (!lastMotionEvent) {
            statusDiv.innerText = '请等待传感器数据后再校准';
            return;
        }
        calibrating = true;
        calibrateSamples = [];
        statusDiv.innerText = '校准中，请保持手机静止...';
        let sampleCount = 0;
        const originalHandler = motionHandler;
        const collectHandler = (e) => {
            if (!calibrating) return;
            const acc = e.acceleration;
            if (!acc) return;
            let x = (acc.x || 0) * 100;
            let y = (acc.y || 0) * 100;
            let z = (acc.z || 0) * 100;
            calibrateSamples.push({x, y, z});
            sampleCount++;
            if (sampleCount >= 30) {
                let sx=0, sy=0, sz=0;
                for(let s of calibrateSamples) { sx += s.x; sy += s.y; sz += s.z; }
                offset.x = sx / calibrateSamples.length;
                offset.y = sy / calibrateSamples.length;
                offset.z = sz / calibrateSamples.length;
                calibrating = false;
                window.removeEventListener('devicemotion', collectHandler);
                window.addEventListener('devicemotion', originalHandler);
                statusDiv.innerText = '归零校准完成';
                debugDiv.innerText = `新偏移: ${offset.x.toFixed(2)}, ${offset.y.toFixed(2)}, ${offset.z.toFixed(2)}`;
                if (lastMotionEvent) updateDisplay(lastMotionEvent);
            }
        };
        window.removeEventListener('devicemotion', originalHandler);
        window.addEventListener('devicemotion', collectHandler);
        setTimeout(() => {
            if (calibrating) {
                calibrating = false;
                window.removeEventListener('devicemotion', collectHandler);
                window.addEventListener('devicemotion', originalHandler);
                statusDiv.innerText = '校准超时，请重试';
            }
        }, 3000);
    }

    function requestSensorPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        startListening();
                        statusDiv.innerText = '已授权，正在获取数据...';
                    } else {
                        statusDiv.innerText = '授权失败，无法获取传感器数据';
                    }
                })
                .catch(err => {
                    statusDiv.innerText = '授权出错：' + err.message;
                });
        } else {
            startListening();
            statusDiv.innerText = '已启动监听（无需授权）';
        }
    }

    function initChart() {
        const ctx = document.getElementById('accelChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(60).fill(''),
                datasets: [{
                    label: '合成加速度 (Gal)',
                    data: new Array(60).fill(0),
                    borderColor: '#ffaa66',
                    backgroundColor: 'rgba(255,170,102,0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                animation: false,
                plugins: { legend: { labels: { color: '#ddd' } } },
                scales: {
                    y: { title: { display: true, text: 'Gal', color: '#aaa' }, min: -100, max: 100 },
                    x: { ticks: { display: false } }
                }
            }
        });
        dataArray = new Array(60).fill(0);
        chart.data.datasets[0].data = dataArray;
        chart.update();
    }

    rangeSlider.addEventListener('input', (e) => {
        let val = parseInt(e.target.value);
        rangeValueSpan.innerText = val;
        if (chart) {
            chart.options.scales.y.max = val;
            chart.options.scales.y.min = -val;
            chart.update();
        }
    });
    speedSlider.addEventListener('input', (e) => {
        updateInterval = parseInt(e.target.value);
        speedValueSpan.innerText = updateInterval;
    });
    calibrateBtn.addEventListener('click', startCalibration);
    requestBtn.addEventListener('click', requestSensorPermission);

    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission !== 'function') {
        startListening();
        statusDiv.innerText = '自动启动（安卓/旧iOS）';
    } else {
        statusDiv.innerText = '请点击上方的授权传感器按钮';
    }

    initChart();
</script>
</body>
</html>
