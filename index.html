<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>加速度监测器 (gal)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, monospace;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 1.6rem;
            margin-bottom: 16px;
        }
        .card {
            background: rgba(0,0,0,0.5);
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #e0e0e0;
            font-size: 1rem;
        }
        .data-label {
            font-weight: 600;
            color: #a0d6ff;
        }
        .data-value {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #ffd966;
        }
        .visual {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .ball-container {
            background: #1e2a32;
            border-radius: 200px;
            width: 200px;
            height: 200px;
            position: relative;
            overflow: hidden;
            border: 2px solid #5bc0be;
        }
        .ball {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ff9a9e, #fad0c4);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.05s linear;
        }
        .permission-btn {
            background: #4caf50;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }
        .permission-btn:hover {
            background: #45a049;
        }
        .status {
            text-align: center;
            color: #ffaa66;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #ccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📳 加速度监测仪 (gal)</h1>
     <div class="card">
        <div class="data-row">
            <span class="data-label">加速度 X (含重力) [gal]</span>
            <span class="data-value" id="accel-g-x">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">加速度 Y (含重力) [gal]</span>
            <span class="data-value" id="accel-g-y">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">加速度 Z (含重力) [gal]</span>
            <span class="data-value" id="accel-g-z">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">线性加速度 X [gal]</span>
            <span class="data-value" id="linear-x">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">线性加速度 Y [gal]</span>
            <span class="data-value" id="linear-y">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">线性加速度 Z [gal]</span>
            <span class="data-value" id="linear-z">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">旋转速率 α [deg/s]</span>
            <span class="data-value" id="rot-alpha">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">旋转速率 β [deg/s]</span>
            <span class="data-value" id="rot-beta">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">旋转速率 γ [deg/s]</span>
            <span class="data-value" id="rot-gamma">0.00</span>
        </div>
    </div>

    <div class="visual">
        <div class="ball-container" id="ballContainer">
            <div class="ball" id="ball"></div>
        </div>
    </div>
    <button id="requestBtn" class="permission-btn">🔘 请求传感器权限</button>
    <div id="statusMsg" class="status">⚡ 点击上方按钮授权后开始监测</div>
    <footer>倾斜手机 → 小球移动 | 加速度单位: gal (1 gal = 1 cm/s²)</footer>
</div>   
<script>
    let motionEnabled = false;
    const accelGX = document.getElementById('accel-g-x');
    const accelGY = document.getElementById('accel-g-y');
    const accelGZ = document.getElementById('accel-g-z');
    const linearX = document.getElementById('linear-x');
    const linearY = document.getElementById('linear-y');
    const linearZ = document.getElementById('linear-z');
    const rotAlpha = document.getElementById('rot-alpha');
    const rotBeta = document.getElementById('rot-beta');
    const rotGamma = document.getElementById('rot-gamma');
    const ball = document.getElementById('ball');
    const ballContainer = document.getElementById('ballContainer');
    const statusDiv = document.getElementById('statusMsg');
    const requestBtn = document.getElementById('requestBtn');

    let containerWidth = 200, containerHeight = 200;
    const ballWidth = 40;

    function updateBallOrientation(beta, gamma) {
        let x = (gamma / 90) * (containerWidth/2 - ballWidth/2);
        let y = (beta / 90) * (containerHeight/2 - ballWidth/2);
        x = Math.min(Math.max(x, -containerWidth/2 + ballWidth/2), containerWidth/2 - ballWidth/2);
        y = Math.min(Math.max(y, -containerHeight/2 + ballWidth/2), containerHeight/2 - ballWidth/2);
        ball.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
    }

    function handleMotion(event) {
        if (!motionEnabled) return;
        const accel = event.accelerationIncludingGravity;
        if (accel) {
            // 转换为 gal (1 m/s² = 100 gal)
            accelGX.innerText = ((accel.x || 0) * 100).toFixed(1);
            accelGY.innerText = ((accel.y || 0) * 100).toFixed(1);
            accelGZ.innerText = ((accel.z || 0) * 100).toFixed(1);
        }
        const linear = event.acceleration;
        if (linear) {
            linearX.innerText = ((linear.x || 0) * 100).toFixed(1);
            linearY.innerText = ((linear.y || 0) * 100).toFixed(1);
            linearZ.innerText = ((linear.z || 0) * 100).toFixed(1);
        }
        const rotation = event.rotationRate;
        if (rotation) {
            rotAlpha.innerText = (rotation.alpha || 0).toFixed(1);
            rotBeta.innerText = (rotation.beta || 0).toFixed(1);
            rotGamma.innerText = (rotation.gamma || 0).toFixed(1);
        }
    }

    function handleOrientation(event) {
        if (!motionEnabled) return;
        updateBallOrientation(event.beta, event.gamma);
    }

    function requestSensorPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        enableMotion();
                    } else {
                        statusDiv.innerText = '❌ 权限被拒绝';
                    }
                })
                .catch(err => statusDiv.innerText = '⚠️ 授权失败');
        } else {
            enableMotion();
        }
    }

    function enableMotion() {
        motionEnabled = true;
        statusDiv.innerText = '✅ 监测已启动 (单位: gal) | 倾斜手机试试';
        window.addEventListener('devicemotion', handleMotion);
        window.addEventListener('deviceorientation', handleOrientation);
    }

    function updateContainerSize() {
        const rect = ballContainer.getBoundingClientRect();
        containerWidth = rect.width;
        containerHeight = rect.height;
    }

    requestBtn.addEventListener('click', requestSensorPermission);
    window.addEventListener('resize', updateContainerSize);
    setTimeout(updateContainerSize, 100);

    if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
        statusDiv.innerText = '📱 iOS 需要点击按钮授权';
    } else {
        statusDiv.innerText = '🟢 点击按钮开始监测 (gal)';
    }
</script>
</body>
</html>
