<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>加速度监测仪 · 烈度震度曲线</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, monospace;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 1.6rem;
            margin-bottom: 16px;
        }
        .card {
            background: rgba(0,0,0,0.5);
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #e0e0e0;
            font-size: 1rem;
        }
        .data-label {
            font-weight: 600;
            color: #a0d6ff;
        }
        .data-value {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #ffd966;
        }
        .intensity-value {
            font-size: 1.2rem;
            background: #2c3e50;
            padding: 0 8px;
            border-radius: 20px;
        }
        .canvas-container {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 10px;
            margin: 15px 0;
        }
        canvas {
            width: 100%;
            height: 180px;
            display: block;
        }
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        button {
            background: #4caf50;
            border: none;
            color: white;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .slider-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 0.8rem;
        }
        input[type="range"] {
            width: 150px;
        }
        .status {
            text-align: center;
            color: #ffaa66;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #ccc;
            margin-top: 20px;
        }
        .blink-bg {
            animation: blinkBg 0.3s ease;
        }
        @keyframes blinkBg {
            0% { background: rgba(255,80,80,0.3); }
            100% { background: rgba(0,0,0,0.5); }
        }
        .debug {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📳 加速度监测仪</h1>
    <div class="card" id="dataCard">
        <div class="data-row">
            <span class="data-label">加速度 X (gal)</span>
            <span class="data-value" id="accel-x">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">加速度 Y (gal)</span>
            <span class="data-value" id="accel-y">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">加速度 Z (gal)</span>
            <span class="data-value" id="accel-z">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">合成加速度 (gal)</span>
            <span class="data-value" id="total-accel">0.00</span>
        </div>
        <div class="data-row">
            <span class="data-label">中国地震烈度</span>
            <span class="data-value intensity-value" id="intensity-china">Ⅰ</span>
        </div>
        <div class="data-row">
            <span class="data-label">日本震度 (JMA)</span>
            <span class="data-value intensity-value" id="intensity-japan">0</span>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="accelChart" width="400" height="180"></canvas>
    </div>

    <div class="control-bar">
        <button id="toggleGravityBtn">📊 显示线性加速度</button>
        <button id="togglePrecisionBtn">🔢 精度: 0.1 gal</button>
        <div class="slider-label">
            <span>🐢 更新速度</span>
            <input type="range" id="speedSlider" min="50" max="500" value="200" step="10">
            <span id="speedValue">200</span><span>ms</span>
        </div>
    </div>
    <div class="status" id="statusMsg">⚡ 点击下方按钮授权传感器</div>
    <button id="requestBtn" class="permission-btn" style="width:100%;">🔘 请求传感器权限</button>
    <div id="debugInfo" class="debug"></div>
    <footer>曲线显示最近30次合成加速度 | 震度上升时播放对应音效 | 可调刷新率</footer>
</div>
<script>
    // ---------- DOM 元素 ----------
    const accelXSpan = document.getElementById('accel-x');
    const accelYSpan = document.getElementById('accel-y');
    const accelZSpan = document.getElementById('accel-z');
    const totalSpan = document.getElementById('total-accel');
    const intensityChinaSpan = document.getElementById('intensity-china');
    const intensityJapanSpan = document.getElementById('intensity-japan');
    const statusDiv = document.getElementById('statusMsg');
    const debugDiv = document.getElementById('debugInfo');
    const requestBtn = document.getElementById('requestBtn');
    const toggleGravityBtn = document.getElementById('toggleGravityBtn');
    const togglePrecisionBtn = document.getElementById('togglePrecisionBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedValueSpan = document.getElementById('speedValue');

    // ---------- 状态变量 ----------
    let motionEnabled = false;
    let showGravity = true;          // true: 含重力; false: 线性加速度
    let precision = 0.1;             // 显示精度
    let updateInterval = 200;        // ms
    let lastJapanIntensity = "0";
    let dataArray = [];
    let chart = null;
    let audioAllowed = false;
    let lastPlayTime = 0;
    const DEBOUNCE_MS = 1000;
    let lastTimestamp = 0;
    let sensorDataReceived = false;   // 标记是否收到过传感器数据

    // ---------- 震度音频映射 ----------
    function getAudioForIntensity(japanIntensity) {
        const map = {
            "0": "shindo0", "1": "shindo1", "2": "shindo2", "3": "shindo3", "4": "shindo4",
            "5弱": "shindo5", "5强": "shindo5",
            "6弱": "shindo6", "6强": "shindo6",
            "7": "shindo7"
        };
        const name = map[japanIntensity];
        return name ? `/${name}.mp3` : null;
    }

    function playBeepByIntensity(japanIntensity) {
        if (!audioAllowed) return;
        const now = Date.now();
        if (now - lastPlayTime < DEBOUNCE_MS) return;
        const url = getAudioForIntensity(japanIntensity);
        if (!url) return;
        const audio = new Audio(url);
        audio.play().catch(e => console.log("音频播放失败", e));
        lastPlayTime = now;
    }

    // 烈度/震度映射
    function getChinaIntensity(gal) {
        if (gal < 0.5) return "Ⅰ (无感)";
        if (gal < 1.2) return "Ⅱ";
        if (gal < 2.5) return "Ⅲ";
        if (gal < 5.0) return "Ⅳ";
        if (gal < 10) return "Ⅴ";
        if (gal < 22) return "Ⅵ";
        if (gal < 45) return "Ⅶ";
        if (gal < 90) return "Ⅷ";
        if (gal < 180) return "Ⅸ";
        if (gal < 350) return "Ⅹ";
        if (gal < 700) return "Ⅺ";
        return "Ⅻ";
    }

    function getJapanIntensity(gal) {
        if (gal < 0.8) return "0";
        if (gal < 2.5) return "1";
        if (gal < 8.0) return "2";
        if (gal < 25) return "3";
        if (gal < 80) return "4";
        if (gal < 140) return "5弱";
        if (gal < 250) return "5强";
        if (gal < 400) return "6弱";
        if (gal < 700) return "6强";
        return "7";
    }

    function japanIntensityValue(intensity) {
        const map = {
            "0":0,"1":1,"2":2,"3":3,"4":4,
            "5弱":5.1,"5强":5.5,"6弱":6.1,"6强":6.5,"7":7
        };
        return map[intensity] !== undefined ? map[intensity] : 0;
    }

    // 更新UI
    function updateUI(ax, ay, az, total) {
        let toFixedVal = precision === 0.1 ? 1 : 0;
        accelXSpan.innerText = ax.toFixed(toFixedVal);
        accelYSpan.innerText = ay.toFixed(toFixedVal);
        accelZSpan.innerText = az.toFixed(toFixedVal);
        totalSpan.innerText = total.toFixed(toFixedVal);
        
        const china = getChinaIntensity(total);
        const japan = getJapanIntensity(total);
        intensityChinaSpan.innerText = china;
        intensityJapanSpan.innerText = japan;
        
        const prevVal = japanIntensityValue(lastJapanIntensity);
        const curVal = japanIntensityValue(japan);
        if (curVal > prevVal) {
            playBeepByIntensity(japan);
            const card = document.getElementById('dataCard');
            card.classList.add('blink-bg');
            setTimeout(() => card.classList.remove('blink-bg'), 300);
        }
        lastJapanIntensity = japan;
        
        // 更新图表
        dataArray.push(total);
        if (dataArray.length > 30) dataArray.shift();
        if (chart) {
            chart.data.datasets[0].data = [...dataArray];
            chart.update();
        }
        // 调试信息：显示合成加速度
        debugDiv.innerText = `📊 最新合成加速度: ${total.toFixed(1)} gal | 传感器正常`;
    }

    // 传感器数据处理
    function handleMotion(event) {
        if (!motionEnabled) return;
        const now = Date.now();
        if (now - lastTimestamp < updateInterval) return;
        lastTimestamp = now;
        
        let ax = 0, ay = 0, az = 0;
        let source = "";
        if (showGravity && event.accelerationIncludingGravity) {
            ax = (event.accelerationIncludingGravity.x || 0) * 100;
            ay = (event.accelerationIncludingGravity.y || 0) * 100;
            az = (event.accelerationIncludingGravity.z || 0) * 100;
            source = "重力";
        } else if (!showGravity && event.acceleration) {
            ax = (event.acceleration.x || 0) * 100;
            ay = (event.acceleration.y || 0) * 100;
            az = (event.acceleration.z || 0) * 100;
            source = "线性";
        } else if (event.accelerationIncludingGravity) {
            ax = (event.accelerationIncludingGravity.x || 0) * 100;
            ay = (event.accelerationIncludingGravity.y || 0) * 100;
            az = (event.accelerationIncludingGravity.z || 0) * 100;
            source = "重力(fallback)";
        }
        
        if (!sensorDataReceived && (ax !== 0 || ay !== 0 || az !== 0)) {
            sensorDataReceived = true;
            statusDiv.innerText = '✅ 传感器数据正常 | 震度上升有音效';
        }
        const total = Math.sqrt(ax*ax + ay*ay + az*az);
        updateUI(ax, ay, az, total);
    }

    // 权限请求
    function requestSensorPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        enableMotion();
                    } else {
                        statusDiv.innerText = '❌ 权限被拒绝，无法获取传感器数据';
                        debugDiv.innerText = '请检查浏览器权限设置，允许运动传感器。';
                    }
                })
                .catch(err => {
                    statusDiv.innerText = '⚠️ 授权失败: ' + err.message;
                    debugDiv.innerText = 'iOS 可能需要重新加载页面再点授权。';
                });
        } else {
            enableMotion();
        }
    }

    function enableMotion() {
        motionEnabled = true;
        audioAllowed = true;
        statusDiv.innerText = '✅ 监测已启动 | 等待传感器数据...';
        window.addEventListener('devicemotion', handleMotion);
        // 3秒后如果没有数据，给
        setTimeout(() => {
            if (!sensorDataReceived && motionEnabled) {
                statusDiv.innerText = '⚠️ 未收到传感器数据，请确保手机有陀螺仪且浏览器已授权。';
                debugDiv.innerText = '尝试晃动手机，若仍然无数据，请检查权限或换个浏览器。';
            }
        }, 3000);
    }

    // 图表初始化
    function initChart() {
        const ctx = document.getElementById('accelChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [{
                    label: '合成加速度 (gal)',
                    data: new Array(30).fill(0),
                    borderColor: '#ffaa66',
                    backgroundColor: 'rgba(255,170,102,0.1)',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { labels: { color: '#ddd' } }
                },
                scales: {
                    y: { title: { display: true, text: 'gal', color: '#aaa' }, grid: { color: '#335' } },
                    x: { ticks: { display: false } }
                }
            }
        });
        dataArray = new Array(30).fill(0);
        chart.data.datasets[0].data = dataArray;
        chart.update();
    }

    // 控件事件
    toggleGravityBtn.addEventListener('click', () => {
        showGravity = !showGravity;
        toggleGravityBtn.innerText = showGravity ? "📊 显示线性加速度" : "📊 显示重力加速度";
        statusDiv.innerText = showGravity ? "当前显示: 含重力加速度" : "当前显示: 线性加速度";
    });
    togglePrecisionBtn.addEventListener('click', () => {
        precision = precision === 0.1 ? 1 : 0.1;
        togglePrecisionBtn.innerText = precision === 0.1 ? "🔢 精度: 0.1 gal" : "🔢 精度: 1 gal";
    });
    speedSlider.addEventListener('input', (e) => {
        updateInterval = parseInt(e.target.value);
        speedValueSpan.innerText = updateInterval;
    });

    requestBtn.addEventListener('click', requestSensorPermission);

    initChart();
    if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
        statusDiv.innerText = '📱 iOS 需要点击“请求传感器权限”按钮授权';
    } else {
        statusDiv.innerText = '🟢 点击“请求传感器权限”开始监测';
    }
</script>
</body>
</html>
